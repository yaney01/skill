name: PPT phase three verification

on:
  push:
    branches:
      - agent/ppt-phase-three-tests
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppt/package.json
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Run complete regression
        shell: bash
        run: |
          set +e
          npm run ci > ci-output.txt 2>&1
          code=$?
          cat ci-output.txt
          exit $code
      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppt-ci-output
          path: ppt/ci-output.txt
          if-no-files-found: error

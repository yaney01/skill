<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML PPT Starter</title>
  <link rel="stylesheet" href="../runtime/viewport-base.css">
  <style>
    /* Replace the demo visual tokens and layouts, but preserve the fixed-stage contract. */
    :root {
      --stage-bg: #101114;
      --slide-bg: #f2efe7;
      --ink: #151515;
      --muted: #6c6a65;
      --accent: #e65e2f;
      --display: Georgia, "Noto Serif SC", serif;
      --body: Arial, "Noto Sans SC", sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    h1, h2, p { margin: 0; }
    .slide-inner { height: 100%; padding: 104px 120px; display: grid; align-content: center; }
    .eyebrow { margin: 0 0 26px; color: var(--accent); font: 700 24px/1 var(--body); letter-spacing: .12em; text-transform: uppercase; }
    h1 { max-width: 1500px; color: var(--ink); font: 700 132px/.96 var(--display); letter-spacing: -.045em; }
    .subtitle { max-width: 980px; margin-top: 38px; color: var(--muted); font: 400 34px/1.45 var(--body); }
    .rule { width: 180px; height: 12px; margin-top: 52px; background: var(--accent); }
    .content-layout { grid-template-columns: 5fr 7fr; gap: 92px; align-items: center; }
    .content-layout h2 { color: var(--ink); font: 700 76px/1.04 var(--display); letter-spacing: -.035em; }
    .content-layout p { margin-top: 30px; color: var(--muted); font: 400 31px/1.55 var(--body); }
    .image-frame { aspect-ratio: 16 / 10; overflow: hidden; background: #d8d3c7; box-shadow: 0 28px 72px rgb(0 0 0 / .16); }
    .image-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .slide-count { right: 22px; bottom: 18px; padding: 7px 10px; color: #fff; background: rgb(0 0 0 / .52); border-radius: 7px; font: 600 13px/1 ui-sans-serif, system-ui, sans-serif; }
    .slide-count::after { content: var(--slide-index, "1") " / " var(--slide-count, "2"); }
    @page { size: 1920px 1080px; margin: 0; }
  </style>
</head>
<body>
  <div class="deck-viewport">
    <main class="deck-stage" id="deckStage" data-deck-id="starter-deck">
      <section class="slide active visible" data-slide-id="slide-01" data-layout="cover">
        <div class="slide-inner">
          <p class="eyebrow" data-editable="text" data-element-id="slide-01-eyebrow">HTML PRESENTATION</p>
          <h1 data-editable="text" data-element-id="slide-01-title">A browser-editable deck</h1>
          <p class="subtitle" data-editable="text" data-element-id="slide-01-subtitle">Replace this demo with real content and a context-specific visual system.</p>
          <div class="rule" aria-hidden="true"></div>
        </div>
      </section>

      <section class="slide" data-slide-id="slide-02" data-layout="split">
        <div class="slide-inner content-layout">
          <div>
            <p class="eyebrow" data-editable="text" data-element-id="slide-02-eyebrow">EDIT IN BROWSER</p>
            <h2 data-editable="text" data-element-id="slide-02-title">Press E to edit</h2>
            <p data-editable="text" data-element-id="slide-02-body">Text edits autosave locally. Click the image in edit mode to replace it, then use Ctrl or Command + S to download the edited HTML.</p>
          </div>
          <figure class="image-frame">
            <img
              data-editable="image"
              data-element-id="slide-02-image"
              data-image-slot="16:10"
              src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 1000'%3E%3Crect width='1600' height='1000' fill='%23d7d1c4'/%3E%3Ccircle cx='800' cy='500' r='250' fill='%23e65e2f'/%3E%3C/svg%3E"
              alt="Replaceable demo image"
            >
          </figure>
        </div>
      </section>
    </main>
  </div>
  <div class="slide-count deck-ui" aria-hidden="true"></div>

  <script src="../runtime/deck-runtime.js" defer></script>
  <script src="../runtime/deck-editor.js" defer></script>
</body>
</html>

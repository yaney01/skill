name: PPT phase 6.1 source integration verification

on:
  push:
    branches:
      - agent/ppt-phase-six-one-integration
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppt/package.json
      - name: Install PDF extraction tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: npm install
      - run: npx playwright install chromium
      - name: Syntax and schema checks
        run: |
          node --check scripts/create-deck.mjs
          node --check tests/source-integration.test.mjs
          python3 -m json.tool schemas/deck.schema.json >/dev/null
          python3 -m json.tool schemas/source.schema.json >/dev/null
      - name: Run source integration regression
        run: npm run test:source
      - name: Run complete regression suite
        run: npm run ci

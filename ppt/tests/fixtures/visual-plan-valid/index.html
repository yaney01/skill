<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Visual Plan Fixture</title>
<style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111}.deck-stage{width:1920px;height:1080px;position:relative}.slide{position:absolute;inset:0;width:1920px;height:1080px;padding:90px;background:#f4f1e9;color:#111;visibility:hidden;opacity:0}.slide.active,.slide.visible{visibility:visible;opacity:1}.title{font:800 104px/1.05 Arial,sans-serif}.body{font:500 32px/1.55 Arial,sans-serif}.visual{margin-top:60px;height:560px;border:3px solid #111}.nodes{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}.node{display:grid;place-items:center;background:#2455ff;color:#fff;font:700 36px Arial}.compare{display:grid;grid-template-columns:1fr 1fr;gap:40px}.panel{padding:50px;border:3px solid #111;font:700 42px Arial}.statement{height:100%;display:grid;place-items:center;text-align:center}</style></head>
<body><main class="deck-stage" data-deck-id="visual-plan-valid">
<section class="slide active visible" data-slide-id="slide-01" data-layout="cover"><div data-visual-type="typographic" data-visual-role="typography"><h1 class="title">视觉计划先于页面生成</h1><p class="body">固定回归样例</p></div></section>
<section class="slide" data-slide-id="slide-02" data-layout="process" data-visual-required="true"><h2 class="title">三步生产链</h2><div class="visual nodes" data-visual-type="workflow-diagram" data-visual-role="explanation"><div class="node">PLAN</div><div class="node">BUILD</div><div class="node">VERIFY</div></div></section>
<section class="slide" data-slide-id="slide-03" data-layout="statement"><div class="statement" data-visual-type="intentional-text" data-visual-role="typography"><h2 class="title">没有视觉决策，<br>就没有视觉叙事。</h2></div></section>
<section class="slide" data-slide-id="slide-04" data-layout="comparison" data-visual-required="true"><h2 class="title">机械正确与视觉完整</h2><div class="visual compare" data-visual-type="comparison-diagram" data-visual-role="comparison"><div class="panel">结构、越界、资源</div><div class="panel">覆盖、节奏、关系</div></div></section>
</main></body></html>

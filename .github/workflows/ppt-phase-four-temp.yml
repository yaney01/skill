name: PPT phase four verification

on:
  push:
    branches:
      - agent/ppt-phase-four-themes
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppt/package.json
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Run complete regression suite
        run: npm run ci
      - name: Validate production themes
        run: npm run themes:validate
      - name: Render production theme QA
        run: npm run themes:qa
      - name: Bundle and validate theme previews
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p qa/themes/bundled
          for theme in swiss-grid editorial-ink technical-field; do
            node scripts/bundle-html.mjs assets/themes/$theme/preview.html qa/themes/bundled/$theme.html
            node scripts/validate-deck.mjs qa/themes/bundled/$theme.html
          done

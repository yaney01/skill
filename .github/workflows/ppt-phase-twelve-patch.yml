name: Apply phase twelve editor click isolation

on:
  push:
    branches:
      - agent/ppt-phase-twelve-final

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ppt-phase-twelve-final
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node ppt/scripts/patch-phase-twelve-editor-click.mjs
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ppt/assets/runtime/deck-editor.js
          git commit -m "Isolate editable clicks from slide navigation"
          git push origin HEAD:agent/ppt-phase-twelve-final

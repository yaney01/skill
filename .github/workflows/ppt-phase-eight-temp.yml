name: PPT phase eight task regression verification

on:
  push:
    branches:
      - agent/ppt-phase-eight-task-regression-fix
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppt/package.json
      - name: Install PDF extraction tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: npm install
      - run: npx playwright install chromium
      - name: Syntax and schema checks
        run: |
          node --check scripts/validate-task-cases.mjs
          node --check scripts/run-task-regression.mjs
          node --check tests/task-regression.test.mjs
          python3 -m py_compile tests/fixtures/build-source-fixtures.py
          python3 -m json.tool schemas/task.schema.json >/dev/null
          python3 -m json.tool tests/tasks/cases.json >/dev/null
      - name: Validate task contracts
        run: npm run tasks:validate
      - name: Run task regression unit tests
        run: npm run test:tasks
      - name: Run existing core regression
        run: node --test tests/structure.test.mjs tests/bundle.test.mjs tests/themes.test.mjs tests/layouts.test.mjs tests/visual-manifest.test.mjs tests/source-ingestion.test.mjs tests/source-integration.test.mjs
      - name: Run browser regression
        run: npm run test:browser
      - name: Run all task contracts
        run: npm run tasks:run
      - name: Run all rendered task pipelines
        run: npm run tasks:qa
      - name: Run production example pipeline
        run: npm run example:validate && npm run example:manifest && npm run example:visual && npm run example:bundle && node scripts/validate-deck.mjs examples/ai-ad-workflow/dist/ai-ad-workflow.html

name: Apply phase eleven production patches

on:
  push:
    branches:
      - agent/ppt-phase-eleven-visual-production
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ppt-phase-eleven-visual-production
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply exact replacements
        run: |
          node ppt/scripts/patch-phase-eleven-manifest-stage.mjs
          node ppt/scripts/patch-phase-eleven-create-deck.mjs
          node ppt/scripts/patch-phase-eleven-docs.mjs
      - name: Commit patch when needed
        run: |
          if git diff --quiet; then
            echo "No patch changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            ppt/scripts/create-deck.mjs \
            ppt/scripts/lib/visual-contract.mjs \
            ppt/scripts/validate-manifest.mjs \
            ppt/references/visual-planning.md \
            ppt/references/workflow.md \
            ppt/SKILL.md \
            ppt/README.md
          git commit -m "Document visual production work-order lifecycle"
          git push origin HEAD:agent/ppt-phase-eleven-visual-production

name: PPT phase nine presenter mode verification

on:
  pull_request:
    branches:
      - agent/ppt-phase-nine-diagnostic-base-3
  workflow_dispatch:

jobs:
  editor-combined:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx playwright install chromium
      - name: Run complete editor regression
        run: node --test --test-concurrency=1 tests/editor.test.mjs

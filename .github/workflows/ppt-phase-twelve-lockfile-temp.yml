name: Generate PPT lockfile

on:
  push:
    branches:
      - agent/ppt-phase-twelve-release-hardening
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ppt-phase-twelve-release-hardening
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pin npm
        run: npm install --global npm@10.8.2
      - name: Generate lockfile
        working-directory: ppt
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit lockfile
        run: |
          if git diff --quiet -- ppt/package-lock.json; then
            echo "Lockfile already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ppt/package-lock.json
          git commit -m "Add deterministic PPT package lock"
          git push origin HEAD:agent/ppt-phase-twelve-release-hardening

name: Apply phase twelve editor test patch

on:
  push:
    branches:
      - agent/ppt-phase-twelve-final

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ppt-phase-twelve-final
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node ppt/scripts/patch-phase-twelve-editor-test.mjs
      - run: |
          if git diff --quiet -- ppt/tests/editor.test.mjs; then
            echo "Editor test already patched"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ppt/tests/editor.test.mjs
          git commit -m "Stabilize selected-element reset regression"
          git push origin HEAD:agent/ppt-phase-twelve-final

name: PPT phase six source ingestion verification

on:
  push:
    branches:
      - agent/ppt-phase-six-source-ingestion
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppt/package.json
      - name: Install PDF extraction tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: npm install
      - run: npx playwright install chromium
      - name: Syntax checks
        run: |
          python3 -m py_compile scripts/ingest-source.py tests/fixtures/build-source-fixtures.py
          node --check scripts/validate-source.mjs
          node --check tests/source-ingestion.test.mjs
          python3 -m json.tool schemas/source.schema.json >/dev/null
      - name: Run source ingestion regression
        run: npm run test:source
      - name: Run complete regression suite
        run: npm run ci

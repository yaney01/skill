name: Apply phase ten editor boundary patch

on:
  push:
    branches:
      - agent/ppt-phase-ten-editor-enhancements
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ppt-phase-ten-editor-enhancements
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply exact replacements
        run: node ppt/scripts/patch-phase-ten-editor.mjs
      - name: Commit patch when needed
        run: |
          if git diff --quiet; then
            echo "No patch changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ppt/assets/runtime/deck-editor.js ppt/tests/editor.test.mjs
          git commit -m "Fix phase-ten editor migration and download boundaries"
          git push origin HEAD:agent/ppt-phase-ten-editor-enhancements

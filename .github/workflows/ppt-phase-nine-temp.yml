name: PPT phase nine presenter mode verification

on:
  pull_request:
    branches:
      - agent/ppt-phase-nine-diagnostic-base
  workflow_dispatch:

jobs:
  presenter-popup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Run focused popup and reconnect regression
        shell: bash
        env:
          CI: "1"
        run: |
          set -euo pipefail
          git init repo >/dev/null
          cd repo
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git fetch --depth=1 origin "$GITHUB_SHA" >/dev/null 2>&1
          git checkout --detach FETCH_HEAD >/dev/null 2>&1
          cd ppt
          npm install --silent >/dev/null 2>&1
          npx playwright install chromium >/dev/null 2>&1
          node --test --test-concurrency=1 --test-name-pattern="P opens" tests/presenter.test.mjs

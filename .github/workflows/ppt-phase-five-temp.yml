name: PPT phase five visual QA verification

on:
  push:
    branches:
      - agent/ppt-phase-five-visual-qa
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppt/package.json
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Syntax check new scripts
        run: |
          node --check scripts/lib/visual-contract.mjs
          node --check scripts/validate-manifest.mjs
          node --check scripts/qa-visual.mjs
          node --check scripts/build-contact-sheet.mjs
          node --check scripts/create-deck.mjs
      - name: Run complete regression suite
        shell: bash
        run: |
          set +e
          npm run ci > phase-five-output.txt 2>&1
          code=$?
          cat phase-five-output.txt
          exit $code
      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppt-phase-five-output
          path: ppt/phase-five-output.txt
          if-no-files-found: error
      - name: Build real example contact sheet
        run: npm run example:contact-sheet
      - name: Verify contact sheet
        run: test -s examples/ai-ad-workflow/qa/contact-sheet.png

name: Apply phase ten documentation patch

on:
  push:
    branches:
      - agent/ppt-phase-ten-editor-enhancements

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ppt-phase-ten-editor-enhancements
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node ppt/scripts/patch-phase-ten-docs.mjs
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ppt/README.md ppt/SKILL.md
          git commit -m "Document constrained editor enhancements"
          git push origin HEAD:agent/ppt-phase-ten-editor-enhancements

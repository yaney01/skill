name: PPT phase nine presenter mode verification

on:
  push:
    branches:
      - agent/ppt-phase-nine-presenter-mode
  pull_request:
    branches:
      - agent/ppt-phase-nine-diagnostic-base
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: ppt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ppt/package.json
      - name: Install PDF extraction tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: npm install
      - run: npx playwright install chromium
      - name: Syntax and schema checks
        run: |
          node --check assets/runtime/deck-runtime.js
          node --check assets/runtime/deck-editor.js
          node --check scripts/bundle-html.mjs
          node --check tests/presenter.test.mjs
          python3 -m json.tool schemas/deck.schema.json >/dev/null
          python3 -m json.tool examples/ai-ad-workflow/deck.json >/dev/null
      - name: Core regression
        run: npm run test:core
      - name: Runtime regression
        run: node --test --test-concurrency=1 tests/runtime.test.mjs
      - name: Presenter regression
        run: npm run test:presenter
      - name: Editor regression
        run: node --test --test-concurrency=1 tests/editor.test.mjs
      - name: Visual QA regression
        run: node --test --test-concurrency=1 tests/visual-qa.test.mjs
      - name: Task contracts
        run: npm run tasks:validate && npm run tasks:run
      - name: Production example
        run: npm run example:validate && npm run example:manifest && npm run example:visual && npm run example:bundle && node scripts/validate-deck.mjs examples/ai-ad-workflow/dist/ai-ad-workflow.html
      - name: Rendered task regression
        run: npm run tasks:qa
